<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Jesse M. Torres: 30+ years in enterprise technology. One resume, two machines: a vintage television broadcast or a side-scrolling arcade quest.">
<meta property="og:title" content="Jesse Torres &middot; jesseweb.com">
<meta property="og:description" content="One resume, two machines. Tune in the television or insert a coin.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128250;</text></svg>">
<title>Jesse Torres · jesseweb.com</title>
<style>
  :root{
    --room:#0b0908;
    --wood-a:#4a2f1c; --wood-b:#54361f; --wood-c:#3c2515;
    --key:#cfc8bd;
    --mono:"Menlo","Consolas","Courier New",monospace;
    --neon:#ff3d8b; --neon2:#2ee6ff; --neon3:#ffd23d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{overflow-x:hidden}
  body{
    color:var(--key);font-family:var(--mono);
    display:grid;place-items:center;min-height:100vh;padding:34px 16px 46px;overflow-x:hidden;
  }
  .wall{position:fixed;left:0;right:0;top:0;bottom:21vh;z-index:-3;background:linear-gradient(180deg,#201a11 0%,#141008 55%,#0d0a06 100%)}
  .wall::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 52% 60% at 50% 58%, rgba(255,216,150,.05), transparent 72%)}
  .floor{position:fixed;left:0;right:0;bottom:0;height:21vh;z-index:-3;
    background:
      linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.78) 85%),
      repeating-linear-gradient(90deg, #46331f 0 116px, #3b2c1a 116px 119px, #4a3722 119px 232px, #3b2c1a 232px 235px, #42311e 235px 352px, #3b2c1a 352px 355px),
      #46331f}
  .floor::before{content:"";position:absolute;left:0;right:0;top:-2px;height:3px;background:rgba(0,0,0,.6)}

  .stage{display:flex;flex-direction:column;align-items:center;gap:34px;width:100%}
  header{text-align:center}
  header h1{font-size:clamp(26px,4.4vw,40px);font-weight:400;letter-spacing:.5em;padding-left:.5em;color:#e8dcc0;
    text-shadow:0 2px 12px rgba(0,0,0,.8)}
  header .sub{margin-top:12px;font-size:11.5px;letter-spacing:.24em;color:#8a744c}
  header .pick{margin-top:22px;font-size:12px;letter-spacing:.3em;color:#c8b48a;
    border-top:1px solid #3a2c1a;border-bottom:1px solid #3a2c1a;padding:9px 22px;display:inline-block}

  .choices{display:flex;justify-content:center;align-items:stretch;gap:clamp(24px,5vw,70px);flex-wrap:wrap}
  .choice{
    display:flex;flex-direction:column;align-items:center;gap:0;text-decoration:none;color:var(--key);
    padding:26px 30px 22px;border-radius:14px;transition:background .25s, transform .25s;
  }
  .choice:hover{background:rgba(255,216,150,.045);transform:translateY(-4px)}
  .machine{height:250px;display:flex;align-items:flex-end;justify-content:center;position:relative}
  .choice .label{margin-top:20px;font-size:15px;letter-spacing:.3em;padding-left:.3em;color:#e8dcc0}
  .choice .desc{margin-top:9px;font-size:10.5px;letter-spacing:.14em;color:#8a744c;text-align:center;line-height:1.8;max-width:250px}
  .choice .cta{
    margin-top:16px;font-size:11px;letter-spacing:.26em;padding:9px 20px 9px calc(20px + .26em);
    border:1px solid #6b5a38;border-radius:3px;color:#c8b48a;transition:.25s;
  }
  .choice:hover .cta{border-color:#c8b48a;color:#ffe8b0;box-shadow:0 0 18px rgba(255,216,150,.18)}
  .choice.arc:hover .cta{border-color:var(--neon2);color:var(--neon2);box-shadow:0 0 18px rgba(46,230,255,.25)}

  /* ---------- mini television ---------- */
  .minitv{position:relative;width:216px}
  .minitv .ears{position:absolute;top:2px;left:50%;width:0}
  .minitv .rod{position:absolute;bottom:0;left:-1px;width:3px;height:66px;transform-origin:bottom center;border-radius:2px;
    background:linear-gradient(90deg,#6a6f74,#d9dee2 45%,#7c8186)}
  .minitv .rod::after{content:"";position:absolute;top:-5px;left:50%;width:6px;height:6px;margin-left:-3px;border-radius:50%;background:#c9ced2}
  .minitv .rod.rl{transform:rotate(-24deg)}
  .minitv .rod.rr{transform:rotate(24deg)}
  .minitv .box{
    position:relative;border-radius:18px 18px 8px 8px;padding:13px 12px 14px;display:flex;gap:9px;
    background:
      linear-gradient(rgba(0,0,0,0) 58%, rgba(0,0,0,.34)),
      repeating-linear-gradient(88deg, #52341c 0 3px, #5d3c22 3px 5px, #482d17 5px 9px, #573920 9px 12px);
    box-shadow:0 24px 38px -8px rgba(0,0,0,.8), inset 0 3px 4px -2px rgba(255,224,170,.4), inset 0 -8px 14px -6px rgba(0,0,0,.6);
  }
  .minitv .scr{
    width:132px;aspect-ratio:4/3;border-radius:10px;border:3px solid #b6934e;
    background:radial-gradient(ellipse 70% 60% at 42% 38%, #1d2a20, #0a0f0b 80%);
    box-shadow:inset 0 4px 12px rgba(0,0,0,.9);position:relative;overflow:hidden;
  }
  .minitv .scr::after{content:"";position:absolute;inset:0;opacity:0;transition:opacity .3s;
    background:
      radial-gradient(ellipse 70% 60% at 42% 38%, rgba(87,255,106,.16), transparent 75%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 3px)}
  .choice:hover .minitv .scr::after{opacity:1}
  .minitv .side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .minitv .kn{width:16px;height:16px;border-radius:50%;background:repeating-conic-gradient(#241a10 0 14deg,#38281a 14deg 28deg);
    box-shadow:0 2px 3px rgba(0,0,0,.7), inset 0 1px 1px rgba(255,255,255,.15)}
  .minitv .grille{width:26px;height:52px;border-radius:4px;
    background:repeating-linear-gradient(45deg,#a08048 0 2px,#6b5327 2px 4px);opacity:.85}
  .minitv .legs{display:flex;justify-content:space-between;padding:0 26px}
  .minitv .leg{width:9px;height:26px;background:linear-gradient(90deg,#241408,#4a2c14 45%,#1c0f06);border-radius:2px 2px 4px 4px}
  .minitv .leg.l{transform:rotate(7deg)}
  .minitv .leg.r{transform:rotate(-7deg)}

  /* ---------- mini arcade cabinet ---------- */
  .minicab{position:relative;width:158px;filter:drop-shadow(0 24px 30px rgba(0,0,0,.75))}
  .minicab .cab{
    background:linear-gradient(160deg,#26242e,#17161e);
    border-radius:8px 8px 4px 4px;padding:9px 10px 12px;
    clip-path:polygon(0 0,100% 0,100% 26%,88% 34%,88% 100%,12% 100%,12% 34%,0 26%);
    box-shadow:inset 0 2px 2px rgba(255,255,255,.08);
  }
  .minicab .mq{
    border-radius:5px;padding:7px 0 6px;text-align:center;background:#0d0c12;
    font-size:9px;font-weight:900;letter-spacing:.18em;padding-left:.18em;
    color:var(--neon);text-shadow:0 0 10px rgba(255,61,139,.8);
    transition:.3s;
  }
  .choice:hover .minicab .mq{color:#fff;text-shadow:0 0 14px rgba(255,61,139,1), 0 0 4px #fff}
  .minicab .cscr{
    margin:8px 8px 0;aspect-ratio:4/3;border-radius:4px;position:relative;overflow:hidden;
    background:linear-gradient(180deg,#7ea7c4 0%,#cfd8b8 62%,#7a8a55 62%,#6b5a38 100%);
    box-shadow:inset 0 0 12px rgba(0,0,0,.55);
  }
  .minicab .cscr i{position:absolute;left:18%;bottom:34%;width:9px;height:13px;background:#2a4a7a}
  .minicab .cscr i::before{content:"";position:absolute;top:-4px;left:1px;width:7px;height:4px;background:#e8b088}
  .minicab .cscr u{position:absolute;right:20%;bottom:40%;width:9px;height:9px;background:#1a1a2e;
    box-shadow:inset 0 -3px 0 #e8e8f0, inset 0 2px 0 var(--neon2)}
  .choice:hover .minicab .cscr u{animation:bob 1.1s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-4px)}}
  .minicab .deck{
    margin:8px 4px 0;height:26px;border-radius:3px 3px 6px 6px;
    background:linear-gradient(180deg,#2c2a36,#17161e);
    display:flex;align-items:center;justify-content:center;gap:16px;
    box-shadow:inset 0 1px 1px rgba(255,255,255,.1);
  }
  .minicab .joy{width:7px;height:7px;border-radius:50%;background:var(--neon);position:relative;top:-4px;
    box-shadow:0 0 6px rgba(255,61,139,.6)}
  .minicab .joy::after{content:"";position:absolute;top:6px;left:2.5px;width:2px;height:8px;background:#555}
  .minicab .btn{width:8px;height:8px;border-radius:50%;background:var(--neon3);box-shadow:0 0 6px rgba(255,210,61,.5)}
  .minicab .btn.b{background:var(--neon2);box-shadow:0 0 6px rgba(46,230,255,.5)}
  .minicab .slot{margin:7px 30px 0;height:9px;border-radius:2px;background:#0d0c12;display:flex;align-items:center;justify-content:center}
  .minicab .slot i{width:14px;height:2.5px;background:#3a3844;border-radius:1px}

  footer{display:flex;align-items:center;gap:14px;font-size:11px;letter-spacing:.2em}
  footer a{color:#c8b48a;text-decoration:none;border-bottom:1px solid #6b5a38;padding-bottom:2px}
  footer a:hover{color:#ffe8b0}
  footer span{color:#6b5a38}

  @media (max-width:560px){
    body{padding:24px 12px 36px}
    .stage{gap:26px}
    header .pick{margin-top:14px}
    .choice{padding:18px 14px 16px}
    .machine{height:210px}
    .machine .minitv{transform:scale(.85);transform-origin:bottom center}
    .machine .minicab{transform:scale(.9);transform-origin:bottom center}
  }
  @media (prefers-reduced-motion:reduce){
    .choice,.choice .cta{transition:none}
    .choice:hover .minicab .cscr u{animation:none}
  }
</style>
</head>
<body>
<div class="wall"></div>
<div class="floor"></div>

<div class="stage">
  <header>
    <h1>JESSEWEB</h1>
    <div class="sub">JESSE M. TORRES &middot; SENIOR CORE PLATFORM ENGINEER</div>
    <div class="pick">ONE RESUME &middot; TWO MACHINES &middot; PICK ONE</div>
  </header>

  <div class="choices">
    <a class="choice" href="/tv/">
      <div class="machine">
        <div class="minitv">
          <div class="ears"><div class="rod rl"></div><div class="rod rr"></div></div>
          <div class="box">
            <div class="scr"></div>
            <div class="side"><div class="grille"></div><div class="kn"></div><div class="kn"></div></div>
          </div>
          <div class="legs"><div class="leg l"></div><div class="leg r"></div></div>
        </div>
      </div>
      <div class="label">THE TELEVISION</div>
      <div class="desc">WJMT-TV &middot; 22 CHANNELS OF VINTAGE BROADCAST TELL THE STORY</div>

    </a>

    <a class="choice arc" href="/game/">
      <div class="machine">
        <div class="minicab">
          <div class="cab">
            <div class="mq">TORRES&nbsp;QUEST</div>
            <div class="cscr"><i></i><u></u></div>
            <div class="deck"><div class="joy"></div><div class="btn"></div><div class="btn b"></div></div>
            <div class="slot"><i></i></div>
          </div>
        </div>
      </div>
      <div class="label">THE ARCADE</div>
      <div class="desc">TORRES QUEST &middot; RUN, JUMP, AND COLLECT A 30-YEAR CAREER</div>
      <div class="cta">INSERT COIN</div>
    </a>
  </div>

  <footer>
    <a href="https://github.com/JesseWebDotCom" target="_blank" rel="noopener">GITHUB</a>
    <span>&middot;</span>
    <a href="https://www.linkedin.com/in/jessemtorres/" target="_blank" rel="noopener">LINKEDIN</a>
  </footer>
</div>
</body>
</html>
